<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Histoire de l'Informatique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--bg2:#0d1120;--bg3:#141828;--gold:#c9a84c;--gold2:#e8c97a;--text:#ddd8cc;--muted:#7a7669;--border:#2a2d3a;--accent:#0d1120}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#06080f}
body{font-family:'Cormorant Garamond',Georgia,serif;color:var(--text)}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.header{padding-top:calc(14px + env(safe-area-inset-top));background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px 8px}
.app-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--gold);letter-spacing:.5px}
.lang-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:16px;cursor:pointer}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 8px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:none;border:none;padding:8px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.main{flex:1;overflow-y:auto;padding-bottom:calc(12px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.tab-content{display:none}.tab-content.active{display:block}
/* CHRONO */
.era-header{padding:10px 16px 6px;background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border)}
.era-title{font-family:'IM Fell English',serif;font-size:14px;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.chrono-card{background:var(--bg2);border-left:3px solid var(--gold);margin:8px 12px;border-radius:6px;padding:12px 14px}
.chrono-top{display:flex;align-items:flex-start;gap:10px}
.chrono-emoji{font-size:24px;flex-shrink:0;line-height:1}
.chrono-date{font-family:'IM Fell English',serif;font-size:13px;color:var(--gold2);margin-bottom:2px}
.chrono-name{font-size:16px;font-weight:600;color:var(--text);line-height:1.2}
.chrono-body{font-size:13px;color:var(--muted);line-height:1.6;margin-top:8px}
/* MACHINES */
.machines-list{padding:8px 12px}
.machine-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.machine-header{display:flex;gap:12px;padding:12px;cursor:pointer}
.machine-img-wrap{width:72px;height:72px;flex-shrink:0;border-radius:8px;overflow:hidden;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px}
.machine-img-wrap img{width:100%;height:100%;object-fit:cover}
.machine-name{font-family:'IM Fell English',serif;font-size:16px;color:var(--gold2);margin-bottom:2px}
.machine-date{font-size:12px;color:var(--muted);margin-bottom:5px}
.machine-short{font-size:13px;color:var(--text);line-height:1.5}
.machine-inventor{font-size:12px;color:var(--gold);margin-top:6px;font-style:italic}
/* DETAIL PANEL */
.detail-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;flex-direction:column}
.detail-panel.open{display:flex}
.detail-header{padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:12px;padding-left:16px;padding-right:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg)}
.detail-back{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:0;line-height:1}
.detail-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--gold);flex:1}
.detail-body{flex:1;overflow-y:auto;padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.detail-img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-bottom:16px;background:var(--bg3)}
.detail-img-placeholder{width:100%;height:160px;border-radius:10px;margin-bottom:16px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:64px}
.detail-date{font-family:'IM Fell English',serif;font-size:14px;color:var(--gold2);margin-bottom:4px}
.detail-inventor{font-size:13px;color:var(--gold);font-style:italic;margin-bottom:12px}
.detail-short{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.4}
.detail-sep{height:1px;background:var(--border);margin:12px 0}
.detail-text{font-size:14px;color:var(--muted);line-height:1.8}
/* QUIZ */
.quiz-wrap{padding:12px}
.quiz-score-bar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.quiz-score-label{font-size:13px;color:var(--muted)}
.quiz-score-val{font-family:'IM Fell English',serif;font-size:20px;color:var(--gold)}
.quiz-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.quiz-num{font-size:11px;color:var(--muted);margin-bottom:6px}
.quiz-q{font-size:15px;font-weight:600;line-height:1.5;margin-bottom:12px;color:var(--text)}
.quiz-answers{display:flex;flex-direction:column;gap:8px}
.quiz-answer{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;width:100%}
.quiz-answer.correct{background:#1a3a1f;border-color:#4a7c59;color:#8abf9a}
.quiz-answer.wrong{background:#3a1a1a;border-color:#7c4a4a;color:#bf8a8a}
.quiz-answer.revealed{pointer-events:none}
.quiz-reset{width:100%;background:var(--accent);border:1px solid var(--gold);border-radius:8px;padding:12px;font-family:'IM Fell English',serif;font-size:16px;color:var(--gold);cursor:pointer;margin-top:8px}
/* SETTINGS */
.settings-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:100;flex-direction:column;overflow-y:auto}
.settings-panel.open{display:flex}
.settings-header{padding-top:calc(16px + env(safe-area-inset-top));padding-bottom:12px;padding-left:16px;padding-right:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.settings-back{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;padding:0}
.settings-title{font-family:'IM Fell English',serif;font-size:18px;color:var(--gold)}
.settings-body{padding:16px;padding-bottom:calc(24px + env(safe-area-inset-bottom))}
.settings-section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.app-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.app-icon-wrap{width:58px;height:58px;border-radius:13px;background:var(--bg3);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:26px}
.app-icon-wrap img{width:100%;height:100%;object-fit:cover;border-radius:12px}
.app-name-lbl{font-size:9px;color:var(--muted);text-align:center;line-height:1.3}
.settings-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;width:100%;text-align:left;margin-bottom:8px}
.badge-wrap{margin-top:16px;text-align:center}
.badge-wrap img{height:40px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-inner">
      <div class="app-title" id="appTitleEl">💻 Histoire de l'Informatique</div>
      <button class="lang-btn" onclick="toggleLang()">🇬🇧</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chrono',this)" id="tab-chrono">🕰️ Chronologie</button>
      <button class="tab" onclick="switchTab('machines',this)" id="tab-machines">🖥️ Machines</button>
      <button class="tab" onclick="switchTab('quiz',this)" id="tab-quiz">🎓 Quiz</button>
      <button class="tab" onclick="openSettings()">📱 Apps</button>
    </div>
  </div>
  <div class="main">
    <div class="tab-content active" id="tab-chrono-content"></div>
    <div class="tab-content" id="tab-machines-content"><div class="machines-list" id="machinesList"></div></div>
    <div class="tab-content" id="tab-quiz-content">
      <div class="quiz-wrap">
        <div class="quiz-score-bar">
          <span class="quiz-score-label" id="quizScoreLabel">Score</span>
          <span class="quiz-score-val" id="quizScoreVal">0 / 0</span>
        </div>
        <div id="quizContainer"></div>
        <button class="quiz-reset" onclick="resetQuiz()" id="quizResetBtn" style="display:none">🔄 Recommencer</button>
      </div>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitleEl"></div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-header">
    <button class="settings-back" onclick="closeSettings()">←</button>
    <div class="settings-title" id="settingsTitleEl">Autres Apps</div>
  </div>
  <div class="settings-body">
    <div class="settings-section-title" id="settingsAppsLbl">Mes applications</div>
    <div class="apps-grid" id="appsGrid"></div>
    <div class="badge-wrap"><img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/fr-fr" alt="App Store"></div>
    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">© Michel Garlandat</div>
  </div>
</div>

<script>
let lang='fr';
function toggleLang(){
  lang=lang==='fr'?'en':'fr';
  document.querySelector('.lang-btn').textContent=lang==='fr'?'🇬🇧':'🇫🇷';
  document.getElementById('appTitleEl').textContent=lang==='fr'?'💻 Histoire de l\'Informatique':'💻 History of Computing';
  document.getElementById('settingsTitleEl').textContent=lang==='fr'?'Autres Apps':'Other Apps';
  document.getElementById('settingsAppsLbl').textContent=lang==='fr'?'Mes applications':'My apps';
  document.getElementById('tab-chrono').textContent=lang==='fr'?'🕰️ Chronologie':'🕰️ Timeline';
  document.getElementById('tab-machines').textContent=lang==='fr'?'🖥️ Machines':'🖥️ Machines';
  document.getElementById('tab-quiz').textContent=lang==='fr'?'🎓 Quiz':'🎓 Quiz';
  document.getElementById('quizResetBtn').textContent=lang==='fr'?'🔄 Recommencer':'🔄 Restart';
  renderChrono(); renderMachines(); if(quizInitialized) renderQuiz();
}
function switchTab(name,el){
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name+'-content').classList.add('active');
  el.classList.add('active');
  if(name==='quiz'&&!quizInitialized) initQuiz();
}
function openSettings(){document.getElementById('settingsPanel').classList.add('open');loadApps();}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');}

// ── CHRONOLOGIE ──────────────────────────────────────────────────

function renderChrono(){
  const c=document.getElementById('tab-chrono-content');
  c.innerHTML='';
  ERAS.forEach(era=>{
    const div=document.createElement('div');
    const hdr=document.createElement('div');
    hdr.className='era-header';
    hdr.innerHTML='<div class="era-title">'+(lang==='fr'?era.fr:era.en)+'</div>';
    div.appendChild(hdr);
    era.items.forEach(item=>{
      const card=document.createElement('div');
      card.className='chrono-card';
      card.innerHTML='<div class="chrono-top"><div class="chrono-emoji">'+item.emoji+'</div><div><div class="chrono-date">'+(lang==='fr'?item.dateFr:item.dateEn)+'</div><div class="chrono-name">'+(lang==='fr'?item.fr:item.en)+'</div></div></div><div class="chrono-body">'+(lang==='fr'?item.descFr:item.descEn)+'</div>';
      div.appendChild(card);
    });
    c.appendChild(div);
  });
}

const imgCache={};
function renderMachines(){
  const list=document.getElementById('machinesList');
  list.innerHTML='';
  MACHINES.forEach(m=>{
    const card=document.createElement('div');
    card.className='machine-card';
    const hdr=document.createElement('div');
    hdr.className='machine-header';
    hdr.onclick=()=>openDetail(m);
    const wrap=document.createElement('div');
    wrap.className='machine-img-wrap';
    wrap.id='imgwrap-'+m.id;
    if(imgCache[m.id]){
      const img=document.createElement('img');img.src=imgCache[m.id];wrap.appendChild(img);
    } else {
      wrap.textContent=m.emoji;
      loadImg(m.id,m.wt,wrap);
    }
    const info=document.createElement('div');
    info.innerHTML='<div class="machine-name">'+(lang==='fr'?m.fr:m.en)+'</div><div class="machine-date">'+m.date+'</div><div class="machine-short">'+(lang==='fr'?m.shortFr:m.shortEn)+'</div>';
    hdr.appendChild(wrap);hdr.appendChild(info);
    card.appendChild(hdr);
    list.appendChild(card);
  });
}

function openDetail(m){
  document.getElementById('detailTitleEl').textContent=lang==='fr'?m.fr:m.en;
  const body=document.getElementById('detailBody');
  body.innerHTML='';
  const imgWrap=document.createElement('div');
  if(imgCache[m.id]){
    const img=document.createElement('img');img.className='detail-img';img.src=imgCache[m.id];
    imgWrap.appendChild(img);
  } else {
    const ph=document.createElement('div');ph.className='detail-img-placeholder';ph.textContent=m.emoji;
    imgWrap.appendChild(ph);
    loadImgInto(m.id,m.wt,imgWrap,ph);
  }
  body.appendChild(imgWrap);
  const date=document.createElement('div');date.className='detail-date';date.textContent=m.date;body.appendChild(date);
  const inv=document.createElement('div');inv.className='detail-inventor';inv.textContent=lang==='fr'?m.inventorFr:m.inventorEn;body.appendChild(inv);
  const sh=document.createElement('div');sh.className='detail-short';sh.textContent=lang==='fr'?m.shortFr:m.shortEn;body.appendChild(sh);
  const sep=document.createElement('div');sep.className='detail-sep';body.appendChild(sep);
  const txt=document.createElement('div');txt.className='detail-text';txt.textContent=lang==='fr'?m.detailFr:m.detailEn;body.appendChild(txt);
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail(){document.getElementById('detailPanel').classList.remove('open');}

function loadImg(id,wt,wrap){loadImgInto(id,wt,wrap,null);}

async function loadImgInto(id,wt,container,placeholder){
  if(!wt) return;
  try{
    let src=null;
    const apiEN='https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(wt)+'&prop=pageimages&pithumbsize=600&format=json&origin=*';
    const apiFR=apiEN.replace('en.wikipedia','fr.wikipedia');
    if(typeof CapacitorHttp!=='undefined'){
      const r=await CapacitorHttp.get({url:apiEN});
      const d=JSON.parse(r.data);
      const page=Object.values(d.query.pages)[0];
      if(page&&page.thumbnail) src=page.thumbnail.source;
      if(!src){
        const r2=await CapacitorHttp.get({url:apiFR});
        const d2=JSON.parse(r2.data);
        const p2=Object.values(d2.query.pages)[0];
        if(p2&&p2.thumbnail) src=p2.thumbnail.source;
      }
      if(!src) return;
      const r3=await CapacitorHttp.get({url:src,responseType:'arraybuffer'});
      imgCache[id]='data:image/jpeg;base64,'+r3.data;
    } else {
      const r=await fetch(apiEN);
      const d=await r.json();
      const page=Object.values(d.query.pages)[0];
      if(page&&page.thumbnail) src=page.thumbnail.source;
      if(!src){
        const r2=await fetch(apiFR);
        const d2=await r2.json();
        const p2=Object.values(d2.query.pages)[0];
        if(p2&&p2.thumbnail) src=p2.thumbnail.source;
      }
      if(!src) return;
      imgCache[id]=src;
    }
    const listWrap=document.getElementById('imgwrap-'+id);
    if(listWrap){listWrap.innerHTML='';const img=document.createElement('img');img.src=imgCache[id];listWrap.appendChild(img);}
    if(placeholder&&placeholder.parentNode===container){
      container.removeChild(placeholder);
      const img=document.createElement('img');img.className='detail-img';img.src=imgCache[id];
      container.insertBefore(img,container.firstChild);
    }
  }catch(e){}
}

function renderQuiz(){

  const c=document.getElementById('quizContainer');
  c.innerHTML='';
  document.getElementById('quizScoreVal').textContent=quizScore+' / '+quizAnswered;
  document.getElementById('quizResetBtn').style.display=quizAnswered===QUIZ.length?'block':'none';

    const q=QUIZ[qi];
    const div=document.createElement('div');
    div.className='quiz-card';
    div.innerHTML='<div class="quiz-num">'+(idx+1)+' / '+QUIZ.length+'</div><div class="quiz-q">'+(lang==='fr'?q.qFr:q.qEn)+'</div>';
    const ad=document.createElement('div');ad.className='quiz-answers';
    q.ans.map((a,i)=>({a,i})).sort(()=>Math.random()-.5).forEach(({a,i})=>{
      const btn=document.createElement('button');
      btn.className='quiz-answer';btn.textContent=a;
      btn.onclick=function(){
        if(btn.classList.contains('revealed')) return;
        div.querySelectorAll('.quiz-answer').forEach(b=>b.classList.add('revealed'));
        if(i===q.correct){btn.classList.add('correct');quizScore++;}
        else{btn.classList.add('wrong');div.querySelectorAll('.quiz-answer').forEach(b=>{if(b.textContent===q.ans[q.correct])b.classList.add('correct');});}
        quizAnswered++;
        document.getElementById('quizScoreVal').textContent=quizScore+' / '+quizAnswered;
        if(quizAnswered===QUIZ.length) document.getElementById('quizResetBtn').style.display='block';
      };
      ad.appendChild(btn);
    });
    div.appendChild(ad);c.appendChild(div);
  });
}
function resetQuiz(){quizScore=0;quizAnswered=0;quizOrder=QUIZ.map((_,i)=>i).sort(()=>Math.random()-.5);renderQuiz();}

    window['itcb'+numId]=function(d){if(d.results&&d.results[0]){wrap.innerHTML='';const img=document.createElement('img');img.src=d.results[0].artworkUrl60;wrap.appendChild(img);}};

    item.appendChild(wrap);item.appendChild(lbl);grid.appendChild(item);
  });
}

// ── FONT SIZE ────────────────────────────────────────────────────
let fontScale = parseFloat(localStorage.getItem('fs') || '1.0');
const isIPad = navigator.userAgent.includes('iPad') ||
               (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
if(isIPad && !localStorage.getItem('fs')) fontScale = 1.3;
applyFontScale();

function applyFontScale(){
  document.documentElement.style.setProperty('--fs', fontScale);
  const pct = Math.round(fontScale * 100) + '%';
  const el = document.getElementById('fontPreview');
  if(el) el.textContent = pct;
  localStorage.setItem('fs', fontScale);
}
function changeFontSize(delta){
  fontScale = Math.min(1.8, Math.max(0.8, Math.round((fontScale + delta) * 10) / 10));
  applyFontScale();
}
